name: asha_worker_app
description: Arogya-SMC ASHA Worker Health Monitoring System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local Database
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.28

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # HTTP Client (mock mode)
  dio: ^5.4.3+1

  # Connectivity
  connectivity_plus: ^6.0.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Permissions
  permission_handler: ^11.3.1

  # Localization
  easy_localization: ^3.0.7

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.4.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  flutter_downloader: ^1.11.6
  http: ^1.6.0
  url_launcher: ^6.3.2
  xml: ^6.6.1
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/animations/

dependency_overrides:
  web: ^0.5.1

